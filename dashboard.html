    <style>
        /* Dashboard page: fullscreen iframe, no container padding */
        .dashboard-page {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .dashboard-page main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0;
            max-width: none;
        }

        .dashboard-container {
            width: 100%;
            height: calc(100vh - 60px);
            border-radius: 0;
            box-shadow: none;
            padding: 0;
        }

        .dashboard-container iframe {
            width: 100%;
            height: 100%;
            min-height: unset;
            max-height: none;
            border-radius: 0;
        }

        @media (max-width: 768px) {
            .dashboard-container {
                height: calc(100vh - 50px);
            }
        }
    </style>
</head>
