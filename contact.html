<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;700&family=Manrope:wght@500;600;700;800&display=swap" crossorigin="anonymous">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;700&family=Manrope:wght@500;600;700;800&display=swap" media="print" onload="this.media='all'" crossorigin="anonymous">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;700&family=Manrope:wght@500;600;700;800&display=swap"></noscript>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Gonzalo Gamez</title>
    <meta name="description" content="Contact Gonzalo Gamez - AI Engineer based in Riga, Latvia. Get in touch for collaboration opportunities.">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <a href="#main-content" class="skip-link">Skip to content</a>
    <header class="header">
        <nav class="nav container" aria-label="Primary">
            <a href="index.html" class="logo">Gonzalo Gamez</a>
            <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <ul class="nav-menu">
                <li><a href="index.html#about" class="nav-link">About</a></li>
                <li><a href="index.html#projects" class="nav-link">Projects</a></li>
                <li><a href="contact.html" class="nav-link active">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main id="main-content" class="container">
        <section id="contact" class="contact-section">
            <h1 class="contact-title">Get In Touch</h1>
            
            <form id="contact-form" class="contact-form">
                <input type="hidden" name="subject" value="New contact form submission">
                <input type="hidden" name="from_name" value="Portfolio Contact Form">

                <div class="form-group">
                    <label for="name" class="form-label">Name <span aria-hidden="true">*</span><span class="sr-only">(required)</span></label>
                    <input type="text" id="name" name="name" required placeholder="" class="form-input" aria-required="true" aria-describedby="name-error">
                    <span id="name-error" class="error-message" role="alert" aria-live="polite">Please enter your name.</span>
                </div>

                <div class="form-group">
                    <label for="email" class="form-label">Email <span aria-hidden="true">*</span><span class="sr-only">(required)</span></label>
                    <input type="email" id="email" name="email" required placeholder="" class="form-input" aria-required="true" aria-describedby="email-error">
                    <span id="email-error" class="error-message" role="alert" aria-live="polite">Please enter a valid email address.</span>
                </div>

                <div class="form-group">
                    <label for="message" class="form-label">Message <span aria-hidden="true">*</span><span class="sr-only">(required)</span></label>
                    <textarea id="message" name="message" rows="5" required placeholder="" class="form-input form-textarea" aria-required="true" aria-describedby="message-error"></textarea>
                    <span id="message-error" class="error-message" role="alert" aria-live="polite">Please enter your message.</span>
                </div>

                <button type="submit" class="btn">Send Message</button>
            </form>

            <div id="form-status" class="contact-status" role="status" aria-live="polite"></div>
        </section>
    </main>

    <footer class="footer container">
            <div class="social-links">
                <a href="https://github.com/Takosaga" target="_blank" rel="noopener noreferrer" aria-label="GitHub">GitHub</a>
                <a href="https://www.linkedin.com/in/gonzalo-gamez/" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn">LinkedIn</a>
                <a href="mailto:gonzalo.gamez.lv@gmail.com" aria-label="Email">Email</a>
            </div>
        <p>&copy; 2026 Gonzalo Gamez. All rights reserved.</p>
    </footer>

    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('contact-form');
            const status = document.getElementById('form-status');

            if (form) {
                form.addEventListener('submit', async (e) => {
                    e.preventDefault();

                    const formData = new FormData(form);
                    formData.append("access_key", "c8934c56-5fca-42b7-a3dc-4a0d334791eb");

                    const submitBtn = form.querySelector('button[type="submit"]');
                    const originalText = submitBtn.textContent;
                    submitBtn.textContent = 'Sending...';
                    submitBtn.disabled = true;

                    try {
                        const response = await fetch("https://api.web3forms.com/submit", {
                            method: "POST",
                            body: formData
                        });

                        const data = await response.json();

                        if (response.ok) {
                            status.textContent = 'Message sent! I\'ll get back to you soon.';
                            form.reset();
                        } else {
                            status.textContent = 'Error: ' + data.message;
                        }
                    } catch (error) {
                        status.textContent = 'Something went wrong. Please try again later.';
                    } finally {
                        submitBtn.textContent = originalText;
                        submitBtn.disabled = false;
                    }
                });
            }
        });
    </script>
</body>
</html>
